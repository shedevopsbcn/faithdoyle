backend:
  name: github
  repo: shedevopsbcn/faithdoyle
  branch: main

media_folder: "assets"
public_folder: "assets"

collections:

  - name: "homepage"
    label: "Página de inicio"
    files:
      - name: "homepage"
        label: "Página de inicio"
        file: "data/homepage.json"
        fields:
          - { label: "Nombre", name: "name", widget: "string" }
          - { label: "Ubicación / subtítulo", name: "location", widget: "string" }
          - { label: "Párrafo 1 (bio)", name: "bio_1", widget: "text" }
          - { label: "Párrafo 2 (bio)", name: "bio_2", widget: "text" }
          - { label: "Párrafo 3 (bio)", name: "bio_3", widget: "text" }
          - { label: "Foto de perfil", name: "about_photo", widget: "image" }
          - { label: "Subtítulo portafolio", name: "portfolio_subtitle", widget: "string" }
          - label: "Fotos del portafolio (9 fotos, en orden)"
            name: "portfolio_items"
            widget: "list"
            max: 9
            min: 9
            fields:
              - { label: "Foto", name: "image", widget: "image" }
              - { label: "Descripción", name: "alt", widget: "string" }
          - label: "Servicios (3 columnas)"
            name: "services"
            widget: "list"
            max: 3
            min: 3
            fields:
              - { label: "Título del servicio (ej. Fotografía SERVICIOS)", name: "title", widget: "string" }
              - label: "Ítems"
                name: "items"
                widget: "list"
                field: { label: "Ítem", name: "item", widget: "string" }
          - label: "4 fotos de Rinah en la página de inicio"
            name: "strip_photos"
            widget: "list"
            max: 4
            min: 4
            fields:
              - { label: "Foto", name: "image", widget: "image" }
              - { label: "Descripción", name: "alt", widget: "string" }
          - { label: "Tagline del footer", name: "footer_tagline", widget: "string" }

  - name: "contacto"
    label: "Contacto"
    files:
      - name: "contacto"
        label: "Contacto — Foto hero"
        file: "data/contacto.json"
        fields:
          - { label: "Foto Hero", name: "hero", widget: "image" }

  - name: "aniversario"
    label: "Cumpleaños"
    files:
      - name: "aniversario"
        label: "Cumpleaños — Fotos"
        file: "data/aniversario.json"
        fields:
          - { label: "Foto Hero (imagen grande)", name: "hero", widget: "image" }
          - label: "Fotos de la galería"
            name: "photos"
            widget: "list"
            max: 9
            fields:
              - { label: "Foto", name: "image", widget: "image" }
              - { label: "Descripción", name: "alt", widget: "string" }

