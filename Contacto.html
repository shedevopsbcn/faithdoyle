<body>

<!-- NAV BAR (aligned right, pushed left slightly) -->
<section class="hero-section" style="
  width: 100%;
  background-color: white; 
  padding: 20px 0; 
  display: flex; 
  justify-content: left;
  transform: translateX(65%);
  padding-right: 80px; /* increased from 40px */
">

  <nav>
    <div class="nav-links" style="
      display: flex; 
      gap: 40px; 
      font-size: 18px; 
      font-weight: 500;
    ">
      <a href="index.html#about">HOME</a>
      <a href="Boda.html">PROYECTOS</a>
      <a href="Contacto.html">CONTACTO</a>
    </div>
  </nav>

</section>

<!-- SMALL WHITE SPACE BEFORE IMAGE -->
<div style="height: 20px; background-color: white;"></div>

<!-- VIDEO SECTION -->
<section id="video" style="padding: 0;">

  <div style="position: relative; width: 100%;">

    <img 
      src="assets/Casament1.webp" 
      alt="Casament" 
      style="width: 100%; height: 650px; display: block; object-fit: cover;"> <!-- reduced height -->

    <div style="
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 48px;
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
    ">
      Contacto
    </div>

  </div>

</section>

<!-- CONTACT TITLE (BLACK, CENTERED, BELOW IMAGE, BEFORE FORM) -->
<h4 style="
  text-align: center;
  font-size: 35px;
  font-weight: 700;
  text-transform: uppercase;
  color: black !important; /* IMPORTANT: overrides website.css */
  margin-top: 100px;
">
  Contacto
</h4>

<!-- CONTACT FORM SECTION -->
<section class="contact-wrapper">
  <div class="contact-left" style="transform: scale(1.00); transform-origin: top center;">

    <!-- Contact form -->
    <form id="contact-form"
      action="https://formspree.io/f/xvzlvljw"
      method="POST">

      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>

      <textarea name="message" placeholder="Message" required></textarea>

      <button type="submit">Send</button>
    </form>

    <!-- Success message -->
    <p id="success-message" style="display:none; margin-top: 15px;">
      Thank you! Your message has been sent successfully.
    </p>

  </div>
</section>


<!-- FORM SCRIPT -->
<script>
  const form = document.getElementById("contact-form");
  const success = document.getElementById("success-message");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const data = new FormData(form);

    const response = await fetch(form.action, {
      method: "POST",
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      form.reset();
      success.style.display = "block";
    }
  });
</script>

<!-- FOOTER -->
<footer style="color: black; background-color: white; padding: 40px 20px;">

      &nbsp;|&nbsp;
      <a href="https://www.instagram.com/rini_colomer/" target="_blank" style="color: black; text-decoration: underline;">Instagram</a>
    </div>
  </div>

</footer>
