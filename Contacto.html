<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — Rinah Colomer</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAV -->
  <nav class="nav-bar">
    <div class="nav-links">
      <a href="index.html">HOME</a>
      <a href="Boda.html">PROYECTOS</a>
      <a href="Contacto.html">CONTACTO</a>
    </div>
  </nav>

  <div class="spacer"></div>

  <!-- HERO -->
  <div class="hero-banner">
    <img id="hero-img" src="" alt="Contacto">
  </div>

  <!-- CONTACT TITLE -->
  <h2 class="contact-title">Contacto</h2>

  <!-- CONTACT FORM -->
  <section class="contact-wrapper">
    <form class="contact-form"
      id="contact-form"
      action="https://formspree.io/f/xvzlvljw"
      method="POST">

      <input type="text" name="name" placeholder="Nombre" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="message" placeholder="Mensaje" required></textarea>
      <button type="submit">Enviar</button>
    </form>

    <p id="success-message" style="display:none; margin-top: 15px; text-align: center;">
      ¡Gracias! Tu mensaje ha sido enviado correctamente.
    </p>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <hr class="footer-divider">
    <div class="footer-bottom">
      <div class="footer-contact">Tel: +34 609 059 802 | <a href="mailto:hola@rinahcolomer.com">hola@rinahcolomer.com</a></div>
      <div class="footer-social">
        <a href="https://www.linkedin.com/in/rinah-colomer-ayllón/" target="_blank">LinkedIn</a>
        &nbsp;|&nbsp;
        <a href="https://www.instagram.com/rini_colomer/" target="_blank">Instagram</a>
      </div>
    </div>
  </footer>

  <script>
    // Load hero image from CMS data
    fetch('data/contacto.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('hero-img').src = data.hero;
      });

    // Contact form submission
    const form = document.getElementById("contact-form");
    const success = document.getElementById("success-message");
    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        form.reset();
        success.style.display = "block";
      }
    });
  </script>

</body>
</html>
